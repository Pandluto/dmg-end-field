name: Release draft

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release source
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
        run: npm ci

      - name: Match tag to package version
        run: npm run release:verify -- "$GITHUB_REF_NAME"

      - name: Run deterministic quality gate
        run: npm run check

  models_snapshot:
    name: Freeze models.dev snapshot
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      sha256: ${{ steps.snapshot.outputs.sha256 }}
    steps:
      - name: Fetch and validate one release snapshot
        id: snapshot
        shell: bash
        run: |
          mkdir -p release-inputs
          curl --fail --location --retry 3 --retry-all-errors \
            https://models.dev/api.json \
            --output release-inputs/models.dev.api.json
          node -e "JSON.parse(require('node:fs').readFileSync('release-inputs/models.dev.api.json', 'utf8'))"
          sha256="$(sha256sum release-inputs/models.dev.api.json | cut -d ' ' -f 1)"
          echo "sha256=$sha256" >> "$GITHUB_OUTPUT"
          echo "$sha256  models.dev.api.json" > release-inputs/SHA256SUMS

      - name: Upload frozen models snapshot
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-models-snapshot
          path: release-inputs
          if-no-files-found: error
          retention-days: 14

  package:
    name: Package ${{ matrix.label }}
    needs: [validate, models_snapshot]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
            artifact: '*.exe'
          - os: macos-latest
            label: macos-arm64
            artifact: '*.dmg'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: npm

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install application dependencies
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
        run: npm ci

      - name: Install vendored OpenCode dependencies
        working-directory: agent/vendor/opencode
        run: bun install --frozen-lockfile

      - name: Download frozen models snapshot
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-models-snapshot
          path: .runtime/release-inputs

      - name: Build Windows portable package
        if: runner.os == 'Windows'
        env:
          MODELS_DEV_API_JSON: ${{ github.workspace }}/.runtime/release-inputs/models.dev.api.json
          MODELS_DEV_API_SHA256: ${{ needs.models_snapshot.outputs.sha256 }}
        run: npm run electron:build

      - name: Build macOS DMG without automatic signing
        if: runner.os == 'macOS'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          MODELS_DEV_API_JSON: ${{ github.workspace }}/.runtime/release-inputs/models.dev.api.json
          MODELS_DEV_API_SHA256: ${{ needs.models_snapshot.outputs.sha256 }}
        run: npm run electron:build:mac

      - name: Start packaged sidecar and verify writable paths
        run: npm run smoke:packaged-sidecar

      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dmg-end-field-${{ matrix.label }}
          path: release/${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 14

  draft:
    name: Create human-reviewed release draft
    needs: package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts

      - name: Create checksums and draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          mapfile -d '' files < <(find artifacts -type f -print0)
          if (( ${#files[@]} == 0 )); then
            echo 'No release artifacts were downloaded.' >&2
            exit 1
          fi
          mkdir release-files
          for file in "${files[@]}"; do
            name="$(basename "$file")"
            if [[ -e "release-files/$name" ]]; then
              echo "Duplicate release artifact name: $name" >&2
              exit 1
            fi
            cp "$file" "release-files/$name"
          done
          (cd release-files && sha256sum -- *) > SHA256SUMS
          mapfile -d '' release_files < <(find release-files -maxdepth 1 -type f -print0 | sort -z)
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            if [[ "$(gh api "repos/$GH_REPO/releases/tags/$GITHUB_REF_NAME" --jq .draft)" != 'true' ]]; then
              echo "Refusing to replace assets on a published release." >&2
              exit 1
            fi
            gh release upload "$GITHUB_REF_NAME" "${release_files[@]}" SHA256SUMS --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${release_files[@]}" SHA256SUMS \
              --draft \
              --verify-tag \
              --generate-notes \
              --title "终末地伤害工作台 $GITHUB_REF_NAME"
          fi
