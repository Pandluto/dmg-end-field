name: Release draft

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release source
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
        run: npm ci

      - name: Match tag to package version
        run: npm run release:verify -- "$GITHUB_REF_NAME"

      - name: Run deterministic quality gate
        run: npm run check

  package:
    name: Package ${{ matrix.label }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
            artifact: '*.exe'
          - os: macos-latest
            label: macos-arm64
            artifact: '*.dmg'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: npm

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install application dependencies
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
        run: npm ci

      - name: Install vendored OpenCode dependencies
        working-directory: agent/vendor/opencode
        run: bun install --frozen-lockfile

      - name: Build Windows portable package
        if: runner.os == 'Windows'
        run: npm run electron:build

      - name: Build macOS DMG without automatic signing
        if: runner.os == 'macOS'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run electron:build:mac

      - name: Start packaged sidecar and verify writable paths
        run: npm run smoke:packaged-sidecar

      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dmg-end-field-${{ matrix.label }}
          path: release/${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 14

  draft:
    name: Create human-reviewed release draft
    needs: package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts

      - name: Create checksums and draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          mapfile -d '' files < <(find artifacts -type f -print0)
          if (( ${#files[@]} == 0 )); then
            echo 'No release artifacts were downloaded.' >&2
            exit 1
          fi
          printf '%s\0' "${files[@]}" | sort -z | xargs -0 sha256sum > SHA256SUMS
          gh release create "$GITHUB_REF_NAME" "${files[@]}" SHA256SUMS \
            --draft \
            --verify-tag \
            --generate-notes \
            --title "dmg-end-field $GITHUB_REF_NAME"
