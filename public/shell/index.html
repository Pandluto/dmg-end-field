<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DEF 控制台</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", sans-serif;
        background: #edf5ee;
        color: #193423;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 18px;
        background:
          radial-gradient(circle at top right, rgba(95, 154, 118, 0.16), transparent 34%),
          linear-gradient(135deg, #edf6ef 0%, #d8eadc 100%);
      }

      .shell {
        max-width: 560px;
        margin: 0 auto;
        display: grid;
        gap: 14px;
      }

      .hero,
      .section,
      .log-card {
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(25, 52, 35, 0.12);
        box-shadow: 0 14px 32px rgba(25, 52, 35, 0.1);
      }

      .hero,
      .section,
      .log-card {
        padding: 16px;
      }

      .eyebrow {
        margin: 0 0 8px;
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #567062;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        line-height: 1.1;
      }

      .hero p,
      .section p {
        margin: 8px 0 0;
        color: #466051;
        line-height: 1.55;
        font-size: 13px;
      }

      .hero-actions {
        display: flex;
        gap: 10px;
        margin-top: 14px;
      }

      .runtime-strip {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-top: 14px;
      }

      .runtime-pill {
        padding: 9px 10px;
        background: #f4faf5;
        border: 1px solid rgba(25, 52, 35, 0.08);
      }

      .runtime-pill strong {
        display: block;
        font-size: 10px;
        color: #577162;
        text-transform: uppercase;
        letter-spacing: 0.07em;
      }

      .runtime-pill span {
        display: block;
        margin-top: 4px;
        font-size: 13px;
        font-weight: 700;
        color: #173322;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .section h2,
      .log-card-head h2 {
        margin: 0;
        font-size: 16px;
      }

      button {
        height: 36px;
        border: 1px solid #1f5d3b;
        background: #2f7a50;
        color: #fff;
        font-size: 13px;
        font-weight: 700;
      }

      button:hover {
        background: #286844;
      }

      .secondary-button {
        background: #f6fbf7;
        color: #20432d;
      }

      .secondary-button:hover {
        background: #eaf5ec;
      }

      .danger-button {
        border-color: #7d3b3b;
        background: #965050;
      }

      .danger-button:hover {
        background: #844444;
      }

      .status {
        margin-top: 10px;
        padding: 9px 10px;
        background: #f6fbf7;
        border: 1px solid rgba(25, 52, 35, 0.08);
        font-size: 12px;
        line-height: 1.5;
        color: #355242;
      }

      .log-card-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .log {
        margin-top: 12px;
        min-height: 160px;
        max-height: 260px;
        overflow: auto;
        padding: 12px;
        background: #f6fbf7;
        border: 1px solid rgba(25, 52, 35, 0.08);
        white-space: pre-wrap;
        font-size: 12px;
        line-height: 1.55;
      }

      @media (max-width: 620px) {
        .runtime-strip,
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">独立 Electron 外壳</p>
        <h1>桌面控制控制台</h1>
        <p>这是一个独立的小型桌面 GUI。现在主界面完全由 Electron 托管，固定为 1440x900 的 1x 内容区，并忽略 Windows 缩放。右上角关闭只会收起到托盘，只有“完全关闭”才会结束整个进程。</p>
        <div class="hero-actions">
          <button id="open-web" type="button" class="secondary-button">打开主界面</button>
          <button id="quit-app" type="button" class="danger-button">完全关闭</button>
        </div>
        <div class="runtime-strip">
          <div class="runtime-pill">
            <strong>角色</strong>
            <span id="role-value">-</span>
          </div>
          <div class="runtime-pill">
            <strong>平台</strong>
            <span id="platform-value">-</span>
          </div>
          <div class="runtime-pill">
            <strong>应用</strong>
            <span id="app-value">-</span>
          </div>
          <div class="runtime-pill">
            <strong>主机</strong>
            <span id="host-value">-</span>
          </div>
        </div>
      </section>

      <section class="grid">
        <article class="section">
          <h2>捕获</h2>
          <p>预留截图与窗口捕获入口。</p>
          <button type="button" data-action="capture-probe">运行捕获探测</button>
          <div class="status" id="capture-status">空闲</div>
        </article>

        <article class="section">
          <h2>视觉</h2>
          <p>预留 MaaEnd 识图和 OCR 入口。</p>
          <button type="button" data-action="vision-probe">运行视觉探测</button>
          <div class="status" id="vision-status">空闲</div>
        </article>

        <article class="section">
          <h2>指针</h2>
          <p>预留原生鼠标键盘控制入口。</p>
          <button type="button" data-action="pointer-probe">运行指针探测</button>
          <div class="status" id="pointer-status">空闲</div>
        </article>

        <article class="section">
          <h2>运行时</h2>
          <p>验证壳本身和本地运行环境。</p>
          <button type="button" data-action="runtime-probe">运行运行时探测</button>
          <div class="status" id="runtime-status">空闲</div>
        </article>
      </section>

      <section class="log-card">
        <div class="log-card-head">
          <h2>活动日志</h2>
          <button id="clear-log" type="button">清空日志</button>
        </div>
        <div class="log" id="log"></div>
      </section>
    </main>

    <script src="./shell.js"></script>
  </body>
</html>
